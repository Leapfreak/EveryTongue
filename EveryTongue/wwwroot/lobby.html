<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Every Tongue</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #000;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 24px 16px 16px;
        }

        .content {
            flex: 1;
            padding: 0 16px 16px;
            overflow-y: auto;
        }

        .section-label {
            font-size: 13px;
            color: #7c9cf7;
            margin-bottom: 8px;
            font-weight: 600;
        }

        /* Room list */
        .room-list { list-style: none; }
        .room-item {
            background: #252540;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .room-item:hover { background: #2e2e50; }
        .room-name {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
        }
        .room-meta {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .room-meta span { margin-right: 12px; }
        .room-type {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: #3a3a5c;
            color: #aaa;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* Divider between rooms and create */
        .divider {
            border: none;
            border-top: 1px solid #333;
            margin: 16px 0;
        }

        /* Create room form */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
        }

        .type-picker {
            display: flex;
            gap: 8px;
        }
        .type-option {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            border-radius: 10px;
            border: 2px solid #444;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .type-option.selected {
            border-color: #7c9cf7;
            background: #252550;
        }
        .type-option .icon { font-size: 24px; margin-bottom: 4px; }
        .type-option .label { font-size: 13px; color: #fff; }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }
        .toggle-row .label { font-size: 14px; color: #fff; }

        /* Toggle switch */
        .toggle {
            width: 44px; height: 24px;
            background: #444;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle.on { background: #7c9cf7; }
        .toggle::after {
            content: "";
            width: 20px; height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px; left: 2px;
            transition: transform 0.2s;
        }
        .toggle.on::after { transform: translateX(20px); }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #7c9cf7;
            color: #1a1a2e;
        }
        .btn-primary:hover { background: #6b8de6; }
        .btn-primary:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        /* QR overlay */
        .qr-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .qr-overlay.visible { display: flex; }
        .qr-overlay h2 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 16px;
        }
        .qr-overlay img {
            border-radius: 12px;
            background: #fff;
            padding: 16px;
            max-width: 280px;
            width: 100%;
            height: auto;
        }
        .qr-overlay .room-url {
            margin-top: 16px;
            font-size: 13px;
            color: #aaa;
            word-break: break-all;
            text-align: center;
        }
        .qr-overlay .btn {
            margin-top: 20px;
            width: auto;
            padding: 10px 32px;
        }
        .btn-secondary {
            background: #333;
            color: #ccc;
        }
        .btn-close-qr {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="/img/logo.png" alt="Every Tongue" style="max-width:320px;width:100%;height:auto;margin-bottom:8px">
    </div>

    <div class="content">
        <!-- Rooms section (Your Rooms + Public Rooms) — hidden when empty -->
        <div id="rooms-section" style="display:none">
            <div id="my-rooms" style="display:none">
                <div class="section-label">Your Rooms</div>
                <ul class="room-list" id="my-room-list"></ul>
            </div>
            <div id="public-rooms" style="display:none">
                <div class="section-label">Open Rooms</div>
                <ul class="room-list" id="room-list"></ul>
            </div>
            <hr class="divider">
        </div>

        <!-- Create Conversation Room -->
        <div class="section-label">Create Conversation</div>

        <div class="toggle-row">
            <span class="label">Private Room</span>
            <div class="toggle on" id="toggle-private"></div>
        </div>

        <div class="toggle-row">
            <span class="label">Translation engine</span>
            <select id="conv-engine" style="flex:0 1 60%;padding:8px;border-radius:8px;border:1px solid #444;background:#252540;color:#fff;font-size:14px">
                <option value="">Default</option>
            </select>
        </div>

        <button class="btn btn-primary" id="btn-create">Create Conversation</button>

        <!-- Host Conference (template-based) -->
        <div id="conference-section" style="display:none">
            <hr class="divider">
            <div class="section-label">Host Conference</div>

            <div class="form-group">
                <label for="template-select">Template</label>
                <select id="template-select" style="width:100%;padding:10px;border-radius:8px;border:1px solid #444;background:#1a1a2e;color:#e0e0e0;font-size:14px">
                    <option value="">Loading...</option>
                </select>
            </div>

            <div id="hosting-code-group" class="form-group" style="display:none">
                <label for="hosting-code">Hosting Code</label>
                <input type="text" id="hosting-code" placeholder="Enter hosting code"
                       style="width:100%;padding:10px;border-radius:8px;border:1px solid #444;background:#1a1a2e;color:#e0e0e0;font-size:14px"
                       autocomplete="off" autocapitalize="off" spellcheck="false">
            </div>

            <div id="conference-error" style="display:none;color:#ff6b6b;font-size:13px;margin-bottom:12px"></div>

            <button class="btn btn-primary" id="btn-create-conference" disabled>Create Conference</button>
        </div>
    </div>

    <!-- QR Code overlay -->
    <div class="qr-overlay" id="qr-overlay">
        <h2 id="qr-room-name"></h2>
        <img id="qr-image" alt="Room QR Code">
        <div class="room-url" id="qr-url"></div>
        <button class="btn btn-primary" id="btn-join-own">Join Room</button>
        <button class="btn btn-secondary btn-close-qr" id="btn-close-qr">Close</button>
    </div>

    <script src="/js/lobby.js?v=1.8.3a"></script>
</body>
</html>
