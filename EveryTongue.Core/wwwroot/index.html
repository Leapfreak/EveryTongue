<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Every Tongue</title>
<link rel="stylesheet" href="/css/app.css?v=2.7.11">
</head>
<body>
<div id="status" class="disconnected">
  <span id="statusText">Connecting...</span>
  <div id="toolbar">
    <button id="btnAdmin" onclick="toggleAdmin()" title="Remote Control" style="display:none">&#128737;</button>
    <button id="btnHome" onclick="goHome()" title="Home">&#127968;</button>
    <button id="btnSettings" onclick="togglePanel()" title="Settings">&#9881;</button>
    <button id="btnBible" onclick="toggleBible()" title="Bible">&#128214;</button>
    <button id="btnShareRoom" onclick="toggleRoomQr()" title="Share Room" style="display:none">&#128279;</button>
  </div>
</div>
<div id="roomQrOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;flex-direction:column;align-items:center;justify-content:center;padding:24px">
  <div style="color:#fff;font-size:18px;font-weight:600;margin-bottom:16px" id="roomQrTitle"></div>
  <img id="roomQrImg" alt="Room QR" style="border-radius:12px;background:#fff;padding:16px;max-width:280px;width:100%;height:auto">
  <div id="roomQrUrl" style="margin-top:16px;font-size:13px;color:#aaa;word-break:break-all;text-align:center"></div>
  <button onclick="toggleRoomQr()" style="margin-top:20px;padding:10px 32px;border:none;border-radius:10px;background:#333;color:#ccc;font-size:15px;cursor:pointer">Close</button>
</div>
<!-- Admin panel: SERVER-scoped only. Room controls live in the host panel (gear).
     The legacy desktop Live-session controls (#adminLive) are hidden when no
     desktop Live session exists (Lite/containers). Tune + input-language were
     pre-rooms relics superseded by the host panel's pipeline controls. -->
<div id="adminPanel">
  <div id="adminLive">
    <div id="adminStatus">Checking...</div>
    <button class="start" onclick="sendCommand('start')">&#9654; Start</button>
    <button class="stop" onclick="sendCommand('stop')">&#9632; Stop</button>
    <button class="restart" onclick="sendCommand('restart')">&#8635; Restart</button>
    <button class="stop" onclick="sendCommand('clear')">&#10060; Clear</button>
  </div>
  <button onclick="openServerSettings()" style="border-color:#7c9cf7;color:#7c9cf7">&#128295; Settings</button>
</div>
<div id="panel">
  <label id="lblDisplayName">Your Name</label>
  <input type="text" id="displayNameInput" placeholder="Enter your name" onchange="saveDisplayName(this.value)" style="width:100%;padding:8px 10px;border-radius:6px;border:1px solid #555;background:#333;color:#fff;font-size:14px;outline:none;margin-bottom:8px">
  <div style="display:flex;gap:4px;margin-bottom:4px">
    <button onclick="changeFontSize(4)" style="flex:1">A+</button>
    <button onclick="changeFontSize(-4)" style="flex:1">A-</button>
    <button id="btnBold" onclick="toggleBold()" style="flex:1">Bold</button>
  </div>
  <label id="lblFont">Font</label>
  <select id="fontSelect" onchange="changeFont(this.value)">
    <option value="'Segoe UI',Arial,sans-serif">Segoe UI</option>
    <option value="Arial,sans-serif">Arial</option>
    <option value="'Courier New',monospace">Courier New</option>
    <option value="Georgia,serif">Georgia</option>
    <option value="'Times New Roman',serif">Times New Roman</option>
    <option value="Verdana,sans-serif">Verdana</option>
    <option value="'Trebuchet MS',sans-serif">Trebuchet MS</option>
    <option value="Tahoma,sans-serif">Tahoma</option>
  </select>
  <label id="lblColor">Text Color</label>
  <input type="color" id="colorPicker" onchange="changeColor(this.value)" style="width:100%;height:28px;border:1px solid #555;border-radius:4px;background:#333;cursor:pointer">
  <label id="lblVoice">Voice</label>
  <select id="voiceSelect" onchange="onVoiceChange(this.value)"></select>
  <label id="lblSpeed">Speed</label>
  <select id="rateSelect" onchange="speechRate=parseFloat(this.value);ssSet('rate',this.value)">
    <option value="0.7">Slow</option>
    <option value="1" selected>Normal</option>
    <option value="1.3">Fast</option>
    <option value="1.6">Very Fast</option>
  </select>
  <label id="lblSpeak">Read Aloud</label>
  <button id="btnSpeak" onclick="toggleSpeak()" style="width:100%;min-width:60px">&#128264; Read Aloud</button>
  <select id="transLangSelect" style="display:none"></select>
  <label id="lblScroll">Scroll Direction</label>
  <select id="scrollDir" onchange="setScrollDir(this.value)">
    <option value="up">Bottom-up (newest at bottom)</option>
    <option value="down">Top-down (newest at top)</option>
  </select>
  <label id="lblTags">Tags</label>
  <select id="tagMode" onchange="setTagMode(this.value)">
    <option value="off">Off</option>
    <option value="lang">Language</option>
    <option value="time">Time</option>
    <option value="both">Language + Time</option>
  </select>
  <button id="btnSave" onclick="saveTranscript()" style="width:100%;margin-top:12px">&#128190; Save Transcript</button>
</div>
<div id="langPicker">
  <div class="lp-inner">
    <div class="lp-logo"><img src="/img/logo.png" alt="Every Tongue"></div>
    <div class="lp-title" id="lpTitle">Choose your language</div>
    <div id="lpDetected"></div>
    <div class="lp-search-wrap">
      <input id="lpSearch" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div id="lpList"></div>
    <div class="lp-skip" id="lpSkip" onclick="pickLang('')">No translation</div>
    <div id="lpAdmin">
      <div class="lp-admin-toggle" id="lpAdminToggle" onclick="toggleAdminLogin()">Administrator</div>
      <div id="lpAdminForm" style="display:none">
        <input id="lpAdminPin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="off">
        <button id="lpAdminGo" onclick="verifyAdminPin()">OK</button>
        <div id="lpAdminMsg"></div>
      </div>
    </div>
  </div>
</div>
<div id="biblePanel">
  <div id="bibleHeader">
    <select id="bibleTransSelect" onchange="onBibleTransChange(this.value)"></select>
    <input id="bibleRefInput" type="text" placeholder="John 3:16" onkeydown="if(event.key==='Enter')lookupRef()">
    <button id="btnRefGo" onclick="lookupRef()">Go</button>
  </div>
  <div id="bibleNav">
    <button id="btnBibleClose" onclick="closeBible()">&#10005;</button>
    <button id="btnBibleBack" onclick="bibleBack()" style="display:none">&#8592;</button>
    <span id="bibleNavTitle"></span>
    <button id="btnBibleSearch" onclick="toggleBibleSearch()">&#128269;</button>
  </div>
  <div id="bibleSearchBox" style="display:none">
    <input id="bibleSearchInput" type="text" placeholder="Search..." onkeydown="if(event.key==='Enter')bibleSearch()">
    <button onclick="bibleSearch()">&#128269;</button>
  </div>
  <div id="bibleContent"></div>
</div>
<div id="participantBar" style="display:none;background:#1e1e3a;border-bottom:1px solid #333;padding:10px 16px;cursor:pointer;align-items:center;justify-content:space-between;font-size:14px;color:#ccc;flex-shrink:0"><span id="participantBarTitle"></span><span id="participantBarArrow" style="font-size:10px">&#9660;</span></div>
<div id="participantDetails" style="display:none;background:#252540;border-bottom:1px solid #333;padding:10px 16px;max-height:200px;overflow-y:auto;flex-shrink:0"></div>
<div id="speakingBanner"><span class="speaking-dots"><span></span><span></span><span></span></span><span id="speakingName"></span></div>
<div id="container"><div id="lines"><div id="spacer"></div></div></div>
<script src="/js/app.js?v=2.7.15"></script>
</body>
</html>
