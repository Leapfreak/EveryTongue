name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish EveryTongue/EveryTongue.vbproj -c Release -r win-x64 --self-contained false

      - name: Write component versions
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $json = @{ app = $version } | ConvertTo-Json
          Set-Content -Path "EveryTongue/bin/Publish/component-versions.json" -Value $json

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        shell: pwsh
        run: |
          $env:APP_VERSION = "${{ github.ref_name }}".TrimStart("v")
          iscc setup.iss

      - name: Create Zips and Manifest
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")

          # App zip (published output — tools/models downloaded via Download Manager)
          Compress-Archive -Path "EveryTongue/bin/Publish/*" -DestinationPath "Output/EveryTongue_App_${{ github.ref_name }}.zip"

          # Manifest
          $manifest = @{
            app = $version
            files = @{
              app = "EveryTongue_App_${{ github.ref_name }}.zip"
              installer = "EveryTongue_Setup_${version}.exe"
            }
          } | ConvertTo-Json
          Set-Content -Path "Output/manifest.json" -Value $manifest
          Write-Host "Manifest:"
          Write-Host $manifest

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Output/EveryTongue_Setup_*.exe
            Output/EveryTongue_App_${{ github.ref_name }}.zip
            Output/manifest.json
